        <h1 id="MarkDown汇总语法"><a href="#MarkDown汇总语法" class="headerlink" title="MarkDown汇总语法"></a>MarkDown汇总语法</h1><h4 id="1-加粗，斜体，删除线，高亮，下划线，分割线"><a href="#1-加粗，斜体，删除线，高亮，下划线，分割线" class="headerlink" title="1.加粗，斜体，删除线，高亮，下划线，分割线"></a>1.加粗，斜体，删除线，高亮，下划线，分割线</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">加粗：</span><br><span class="line">    **加粗**</span><br><span class="line">斜体：</span><br><span class="line">    *斜体*</span><br><span class="line">删除线：</span><br><span class="line">    ~~删除线~~</span><br><span class="line">高亮：</span><br><span class="line">    ==高亮==</span><br><span class="line">下划线：</span><br><span class="line">   &lt;u&gt;文本&lt;u&gt;</span><br><span class="line">分割线：</span><br><span class="line">    ---或***或___(大于等于<span class="number">3</span>个)</span><br></pre></td></tr></table></figure>

<h4 id="2-标题"><a href="#2-标题" class="headerlink" title="2.标题"></a>2.标题</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">#,##,###,####,#####,######</span><br><span class="line">分别对应<span class="number">1</span>~<span class="number">6</span>级标题，越小越大</span><br></pre></td></tr></table></figure>

<h4 id="3-列表"><a href="#3-列表" class="headerlink" title="3.列表"></a>3.列表</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">有序：</span><br><span class="line">    <span class="number">1.</span> 第一项</span><br><span class="line">    <span class="number">2.</span> 第二项</span><br><span class="line">    <span class="number">3.</span> 。。。</span><br><span class="line">    </span><br><span class="line">无序：( * 可以换成 + 或 -)</span><br><span class="line">    * 第一项</span><br><span class="line">    * 第二项</span><br><span class="line">    * 。。。</span><br></pre></td></tr></table></figure>

<h4 id="4-图片，超链接"><a href="#4-图片，超链接" class="headerlink" title="4.图片，超链接"></a>4.图片，超链接</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">图片：</span><br><span class="line">    ![图片名](图片链接)</span><br><span class="line">超链接：</span><br><span class="line">    [链接名](链接地址)</span><br></pre></td></tr></table></figure>

<h4 id="5-区块引用"><a href="#5-区块引用" class="headerlink" title="5.区块引用"></a>5.区块引用</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">&gt; + 文本</span><br><span class="line">&gt;&gt; + 文本</span><br><span class="line">...根据 &gt; 数量，在不同的层数</span><br></pre></td></tr></table></figure>

<h4 id="6-表格"><a href="#6-表格" class="headerlink" title="6.表格"></a>6.表格</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">直接用工具栏的表格创建即可，代码创建很麻烦</span><br></pre></td></tr></table></figure>
